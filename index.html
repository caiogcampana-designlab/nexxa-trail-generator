<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXXA Trail Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="controls">
        <h1>NEXXA Trail</h1>
        <div class="control-grid">
          <label>Start shape
            <select id="startShape">
              <option value="triangle">Triangle</option>
              <option value="diamond">Diamond</option>
            </select>
          </label>
          <label>End shape
            <select id="endShape">
              <option value="diamond">Diamond</option>
              <option value="triangle">Triangle</option>
            </select>
          </label>
          <label>Start size <input id="startSize" type="range" min="0.35" max="2.6" value="1.18" step="0.01" /></label>
          <label>End size <input id="endSize" type="range" min="0.35" max="2.6" value="0.8" step="0.01" /></label>
          <label>Global scale <input id="globalScale" type="range" min="0.7" max="1.8" value="1" step="0.01" /></label>
          <label>Trail length <input id="trailLength" type="range" min="5" max="12" value="8.6" step="0.1" /></label>
          <label>Start rotation <input id="startRotation" type="range" min="-180" max="180" value="0" step="1" /></label>
          <label>End rotation <input id="endRotation" type="range" min="-180" max="180" value="72" step="1" /></label>
          <label>Stroke thickness <input id="thickness" type="range" min="0.015" max="0.12" value="0.055" step="0.001" /></label>
          <label>Trail curvature <input id="curvature" type="range" min="0" max="2.2" value="1.05" step="0.01" /></label>
          <label>Line density <input id="density" type="range" min="16" max="86" value="54" step="1" /></label>
          <label>Blend progression
            <select id="progression">
              <option value="linear">Linear</option>
              <option value="easeIn">Ease In</option>
              <option value="easeOut">Ease Out</option>
              <option value="easeInOut">Ease In-Out</option>
            </select>
          </label>
          <label>Fade start → end <input id="fade" type="range" min="0" max="0.75" value="0.2" step="0.01" /></label>
          <label>Background swatch</label>
          <div id="bgSwatches" class="swatch-group" aria-label="Background swatch selector"></div>
          <label>Blend side
            <select id="blendSide">
              <option value="start">Start blends into background</option>
              <option value="end">End blends into background</option>
            </select>
          </label>
          <label>Opposite trail swatch</label>
          <div id="oppositeSwatches" class="swatch-group" aria-label="Opposite trail swatch selector"></div>
          <label>3D rotation X <input id="rotX" type="range" min="-180" max="180" value="18" step="1" /></label>
          <label>3D rotation Y <input id="rotY" type="range" min="-180" max="180" value="-22" step="1" /></label>
          <label>3D rotation Z <input id="rotZ" type="range" min="-180" max="180" value="12" step="1" /></label>
        </div>
        <div class="preset-actions">
          <button id="presetFlow01">NEXXA Flow 01</button>
          <button id="presetConvergence">NEXXA Convergence</button>
          <button id="presetSignal">NEXXA Signal</button>
          <button id="smartRandom">Smart Random</button>
        </div>
        <div class="actions">
          <button id="exportPng">Export PNG</button>
          <button id="exportSvg">Export SVG</button>
        </div>
      </aside>
      <main class="viewport">
        <canvas id="scene"></canvas>
        <div id="sceneFallback" class="scene-fallback hidden" role="alert" aria-live="polite"></div>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
