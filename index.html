<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXXA Trail Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="controls">
        <h1>NEXXA Trail</h1>
        <div class="control-grid">
          <label>Render mode
            <select id="renderMode">
              <option value="graphic2d" selected>Graphic 2D Mode</option>
              <option value="vector3d">3D Vector Mode</option>
            </select>
          </label>
          <label>Start shape
            <select id="startShape">
              <option value="triangle">Triangle</option>
              <option value="diamond">Diamond</option>
            </select>
          </label>
          <label>End shape
            <select id="endShape">
              <option value="diamond">Diamond</option>
              <option value="triangle">Triangle</option>
            </select>
          </label>
          <label>Start size <input id="startSize" type="range" min="0.35" max="2.6" value="1.15" step="0.01" /></label>
          <label>End size <input id="endSize" type="range" min="0.35" max="2.6" value="0.85" step="0.01" /></label>
          <label>Global scale <input id="globalScale" type="range" min="0.5" max="2.2" value="1" step="0.01" /></label>
          <label>Trail length <input id="trailLength" type="range" min="3" max="16" value="8" step="0.1" /></label>
          <label>Trail angle (2D mode) <input id="trailAngle" type="range" min="0" max="360" value="0" step="1" /></label>
          <label>Start rotation <input id="startRotation" type="range" min="-180" max="180" value="0" step="1" /></label>
          <label>End rotation <input id="endRotation" type="range" min="-180" max="180" value="0" step="1" /></label>
          <label>Stroke thickness <input id="thickness" type="range" min="0.015" max="0.12" value="0.05" step="0.001" /></label>
          <label>Line density <input id="density" type="range" min="16" max="96" value="56" step="1" /></label>
          <label>Fade start → end <input id="fade" type="range" min="0" max="0.75" value="0.2" step="0.01" /></label>
          <label>Background swatch</label>
          <div id="bgSwatches" class="swatch-group" aria-label="Background swatch selector"></div>
          <label>Start color</label>
          <div id="startSwatches" class="swatch-group" aria-label="Start color selector"></div>
          <label>End color</label>
          <div id="endSwatches" class="swatch-group" aria-label="End color selector"></div>
          <label>3D rotation X <input id="rotX" type="range" min="-180" max="180" value="26" step="1" /></label>
          <label>3D rotation Y <input id="rotY" type="range" min="-180" max="180" value="-34" step="1" /></label>
          <label>3D rotation Z <input id="rotZ" type="range" min="-180" max="180" value="12" step="1" /></label>
        </div>
        <div class="preset-actions">
          <button id="presetFlow01">NEXXA Flow 01</button>
          <button id="presetConvergence">NEXXA Convergence</button>
          <button id="presetSignal">NEXXA Signal</button>
        </div>
        <div class="actions">
          <button id="exportPng">Export PNG</button>
          <button id="exportSvg">Export SVG</button>
        </div>
      </aside>
      <main class="viewport">
        <canvas id="scene"></canvas>
        <div id="sceneFallback" class="scene-fallback hidden" role="alert" aria-live="polite"></div>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
